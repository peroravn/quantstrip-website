<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Licenses - Quantstrip</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #fafafa;
            color: #111;
            font-size: 15px;
        }

        .container {
            padding: 40px 24px 64px;
        }

        .page-header {
            margin-bottom: 28px;
        }

        .page-header h2 {
            font-size: 22px;
            font-weight: 600;
            color: #111;
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }

        .page-header p {
            color: #666;
            font-size: 14px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #888;
            margin-bottom: 12px;
        }

        /* Table */
        .licenses-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            overflow: hidden;
        }

        .licenses-table thead tr {
            border-bottom: 1px solid #e5e5e5;
        }

        .licenses-table th {
            text-align: left;
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #888;
            background: #fafafa;
        }

        .licenses-table th:last-child {
            text-align: right;
        }

        .licenses-table tbody tr {
            border-bottom: 1px solid #e5e5e5;
            transition: background 0.1s;
        }

        .licenses-table tbody tr:last-child {
            border-bottom: none;
        }

        .licenses-table tbody tr:hover {
            background: #f7f7f7;
        }

        .licenses-table td {
            padding: 14px 16px;
            vertical-align: middle;
            font-size: 13px;
            color: #333;
        }

        .licenses-table td:last-child {
            text-align: right;
        }

        /* Status pill */
        .status-pill {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-pill.active {
            background-color: #edf7ee;
            color: #2d7a34;
        }

        .status-pill.expired {
            background-color: #fdf0f0;
            color: #b84040;
        }



        /* Product name cell */
        .product-cell .product-name {
            font-weight: 400;
            font-size: 14px;
            color: #111;
        }

        .product-cell .product-sub {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }

        /* License key cell */
        .key-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .license-key {
            font-family: 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace;
            font-size: 12px;
            color: #444;
            letter-spacing: 0.03em;
            background: #f4f4f4;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #e5e5e5;
        }

        .btn-copy {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: transparent;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: #aaa;
            transition: color 0.15s;
            flex-shrink: 0;
            padding: 0;
        }

        .btn-copy:hover {
            color: #555;
        }

        .btn-copy i {
            font-size: 12px;
        }

        .btn-copy.copied {
            color: #4caf50;
        }

        /* Date cells */
        .date-cell {
            font-size: 13px;
            color: #444;
            font-variant-numeric: tabular-nums;
        }

        .days-remaining {
            font-size: 13px;
            font-variant-numeric: tabular-nums;
        }

        .days-remaining.warning {
            color: #b85c00;
            font-weight: 500;
        }

        .days-remaining.ok {
            color: #444;
        }

        .days-remaining.expired {
            color: #b84040;
        }

        /* Coupon badge */
        .coupon-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 11px;
            color: #555;
            font-family: 'SFMono-Regular', monospace;
        }

        /* No licenses */
        .no-licenses {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 60px 40px;
            text-align: center;
        }

        .no-licenses h3 {
            font-size: 16px;
            font-weight: 600;
            color: #111;
            margin-bottom: 8px;
        }

        .no-licenses p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .no-licenses a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            background: #111;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.15s;
        }

        .no-licenses a:hover {
            background: #333;
        }

        .loading {
            padding: 48px 0;
            color: #888;
            font-size: 14px;
        }

        .back-link {
            margin-top: 32px;
        }

        .back-link a {
            font-size: 14px;
            color: #29b6f6;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.15s;
        }

        .back-link a:hover {
            color: #0396d4;
        }

        .back-link i {
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="page-header">
            <h2>My Licenses</h2>
            <p>View and manage your active software licenses</p>
        </div>

        <div id="loadingDiv" class="loading">
            Loading your licenses…
        </div>

        <div id="noLicensesDiv" class="no-licenses" style="display: none;">
            <h3>No Licenses Yet</h3>
            <p>You haven't purchased any products yet. Browse our products to get started.</p>
            <a href="products.html"><i class="fa-solid fa-arrow-right"></i> Browse Products</a>
        </div>

        <div id="licensesSection" class="section" style="display: none;">
            <div class="section-label">Active &amp; Past Licenses</div>
            <table class="licenses-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Status</th>
                        <th>License Key</th>
                        <th>Purchased</th>
                        <th>Expires</th>
                        <th>Days Left</th>
                        <th>Coupon</th>
                    </tr>
                </thead>
                <tbody id="licensesTableBody">
                </tbody>
            </table>
        </div>

        <div class="back-link">
            <a href="dashboard.html"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
        </div>

    </div>

    <script>
        function checkAuth() {
            const userStr = sessionStorage.getItem('user');
            if (!userStr) {
                window.location.href = 'login.html';
                return null;
            }
            return JSON.parse(userStr);
        }

        function calculateDaysRemaining(expiryDate) {
            const now = new Date();
            const expiry = new Date(expiryDate);
            return Math.ceil((expiry - now) / (1000 * 60 * 60 * 24));
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-GB', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        function copyKey(btn, key) {
            navigator.clipboard.writeText(key).then(() => {
                btn.classList.add('copied');
                btn.innerHTML = '<i class="fa-solid fa-check"></i>';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = '<i class="fa-regular fa-copy"></i>';
                }, 1800);
            }).catch(err => console.error('Failed to copy:', err));
        }

        async function loadLicenses() {
            const user = checkAuth();
            if (!user) return;

            try {
                const response = await fetch(`https://www.quantstrip.com/api/get-licenses?email=${encodeURIComponent(user.email)}`);
                const data = await response.json();

                document.getElementById('loadingDiv').style.display = 'none';

                if (data.success && data.licenses && data.licenses.length > 0) {
                    // Sort: most recent purchase first
                    const sorted = data.licenses.slice().sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                    document.getElementById('licensesSection').style.display = 'block';
                    renderLicenses(sorted);
                } else {
                    document.getElementById('noLicensesDiv').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('loadingDiv').innerHTML =
                    '<p style="color:#b84040;">Error loading licenses. Please try again later.</p>';
                console.error('Error loading licenses:', error);
            }
        }

        function renderLicenses(licenses) {
            const tbody = document.getElementById('licensesTableBody');
            tbody.innerHTML = '';

            licenses.forEach(license => {
                const days = calculateDaysRemaining(license.expires_at);
                const isActive = license.status === 'active' && days > 0;
                const isExpiringSoon = isActive && days <= 7;

                let daysClass = 'ok';
                let daysText = days > 0 ? `${days}d` : '—';
                if (!isActive) { daysClass = 'expired'; daysText = '—'; }
                else if (isExpiringSoon) { daysClass = 'warning'; }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div class="product-cell">
                            <div class="product-name">${license.product_name}</div>
                        </div>
                    </td>
                    <td>
                        <span class="status-pill ${isActive ? 'active' : 'expired'}">
                            ${isActive ? 'Active' : 'Expired'}
                        </span>
                    </td>
                    <td>
                        <div class="key-cell">
                            <span class="license-key">${license.license_key}</span>
                            <button class="btn-copy" onclick="copyKey(this, '${license.license_key}')" title="Copy key">
                                <i class="fa-regular fa-copy"></i>
                            </button>
                        </div>
                    </td>
                    <td class="date-cell">${formatDate(license.created_at)}</td>
                    <td class="date-cell">${formatDate(license.expires_at)}</td>
                    <td><span class="days-remaining ${daysClass}">${daysText}</span></td>
                    <td>${license.coupon_used ? `<span class="coupon-badge">${license.coupon_used}</span>` : '<span style="color:#ccc">—</span>'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        loadLicenses();
    </script>
</body>
</html>
